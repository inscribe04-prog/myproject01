<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register</title>
<!-- Bootstrap 5 CSS — paste this in every <head> -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
>
</head>

<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">

      <!-- col-md-6 = slightly wider than login for the extra fields -->
      <div class="col-md-6">
        <h2 class="text-center mb-4">Create Account</h2>

        <div class="card shadow">
          <div class="card-body p-4">

  <!-- id="regForm" so JS can find it -->
  <form id="regForm">

     <!-- row inside form = two fields side by side -->
              <div class="row mb-3">
                <!-- col = each takes half the row -->
                <div class="col">
                  <label class="form-label">First Name</label>
                  <input type="text" id="regFirst" class="form-control" placeholder="First name">
                </div>
                <div class="col">
                  <label class="form-label">Last Name</label>
                  <input type="text" id="regLast" class="form-control" placeholder="Last name">
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" id="regEmail" class="form-control" placeholder="Enter email">
              </div>

              <div class="mb-3">
                <label class="form-label">Password <span class="text-muted small">(min 8 characters)</span></label>
                <input type="password" id="regPass" class="form-control" placeholder="Password">
              </div>

              <div id="regMsg" class="alert alert-danger d-none"></div>

              <button type="submit" class="btn btn-success w-100">Create Account</button>

            </form>

            <p class="text-center mt-3 mb-0">
              Already have an account? <a href="/index.htm">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- Bootstrap JS — paste before closing </body> -->
<!-- Needed for navbar toggle, dropdowns, modals -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Single script tag — all JS is in /js/register.js -->
<script src="/js/register.js"></script>


</body>
</html>
