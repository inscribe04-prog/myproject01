<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
  <h2>Login</h2>

  <form id="loginForm">
    <input type="email"    id="loginEmail" placeholder="Email address"><br><br>
    <input type="password" id="loginPass"  placeholder="Password"><br><br>
    <button type="submit">Login</button>
  </form>

  <p id="loginMsg" style="color:red"></p>
  <p>No account? <a href="register.htm">Register here</a></p>



  <!-- Single script tag — all JS is in /js/login.js -->
<script src="/js/login.js"></script>
</body>
</html>
