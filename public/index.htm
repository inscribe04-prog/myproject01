<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
<!-- Bootstrap 5 CSS — paste this in every <head> -->
<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
>
</head>

<body class="bg-light">
  <!-- bg-light = light gray background for the whole page -->

  <!-- py-5 = padding top+bottom 5 (large vertical space) -->
  <div class="container py-5">

    <!-- row = Bootstrap grid row -->
    <!-- justify-content-center = center the column -->
    <div class="row justify-content-center">

      <!-- col-md-5 = 5/12 columns on medium+ screens, full on mobile -->
      <div class="col-md-5">

        <!-- text-center = center the heading -->
        <h2 class="text-center mb-4">Login</h2>

        <!-- card = white box, shadow = adds drop shadow -->
        <div class="card shadow">
          <!-- card-body = padding inside the card -->
          <div class="card-body p-4">

    <form id="loginForm">

              <!-- mb-3 = margin-bottom:3 between each field group -->
              <div class="mb-3">
                <!-- form-label = Bootstrap label styling -->
                <label for="loginEmail" class="form-label">Email address</label>
                <!-- form-control = full width, styled input -->
                <input type="email" id="loginEmail" class="form-control" placeholder="Enter email">
              </div>

              <div class="mb-3">
                <label for="loginPass" class="form-label">Password</label>
                <input type="password" id="loginPass" class="form-control" placeholder="Enter password">
              </div>

              <!-- d-none = hidden by default, shown by JS when error occurs -->
              <!-- alert alert-danger = red Bootstrap alert box -->
              <div id="loginMsg" class="alert alert-danger d-none"></div>

              <!-- w-100 = full width button -->
              <!-- btn btn-primary = blue filled button -->
              <button type="submit" class="btn btn-primary w-100">Login</button>

            </form>

            <!-- text-center mt-3 = centered text with top margin -->
            <p class="text-center mt-3 mb-0">
              No account? <a href="/register.htm">Register here</a>
            </p>

          </div>
        </div>
      </div>
    </div>
  </div>
  
<!-- Bootstrap JS — paste before closing </body> -->
<!-- Needed for navbar toggle, dropdowns, modals -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Single script tag — all JS is in /js/login.js -->
<script src="/js/login.js"></script>

</body>
</html>
