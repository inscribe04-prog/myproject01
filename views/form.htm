<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Forms</title>

  <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
  >
</head>

<body class="bg-light">

<!-- navbar = Bootstrap navbar component -->

  <div class="container">

    <!-- navbar-brand = your app name on the left -->
    <a class="navbar-brand fw-bold" href="#">MyProject01</a>

    <!-- hamburger button — shows on mobile -->
    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- collapse = hidden on mobile, visible on desktop -->

      <!-- ms-auto = push links to the right -->
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <span id="welcomeMsg" class="nav-link text-light"></span>

        <li class="nav-item">
          <a class="nav-link" href="/logout">Logout</a>
        </li>

  <div class="container py-4">

 <!-- In form.htm — add this near the top of body
  <p id="welcomeMsg"></p>
  <a href="/logout">Logout</a> -->

  <!-- Welcome message from session! In form.htm — this near the top of body
  <p id="welcomeMsg" class="text-muted"></p>
  <a href="/logout" class="btn btn-outline-secondary btn-sm float-end">Logout</a> -->


<!-- <div class="form-container"> -->

  <div class="card shadow mb-4">
    <div class="card-body p-4">
      <h4 class="mb-4">Form Implementation</h4>
        <p class="mb-3"> Form — AutoComplete, noValidate</p>

        <form id ="myForm" autocomplete="on" novalidate name="BadaForm">


    <!-- Two columns side by side for first + last name -->
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Enter First Name</label>
            <input type="text" id="fnaam" name="fn01" class="form-control" placeholder="First Name">
            <span id="firstErr" class="text-danger small"></span>
            <span id="fnameCount">0 character</span>
          </div>
          <div class="col-md-6">
            <label class="form-label">Enter Last Name</label>
            <input type="text" id="lnaam" name="fn02" class="form-control" placeholder="Last Name">
            <span id="lastErr" class="text-muted small"></span>
            <span id="lnameCount">0 character</span>
          </div>
        </div>

        <div class="mb-3">     
            <label class="form-label">Enter ASIN</label>
            <input type="number" id="num01" name="number1" placeholder="ASIN (0-99)" class="form-control">
            <span id="numCount">0 digit</span>
            <p><span id="numErr" class="text-muted small" style="font-style: italic;">ASIN is a 2-digit number.</span></p>
        </div>


    <!-- Two columns side by side for Password + Confirm Password -->

        <!-- Password with strength indicator -->
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" id="pwd01" name="password01" class="form-control" placeholder="Password">
            <span id="pwdErr" class="text-danger small"></span>
            <span id="strengthMsg" class="small fw-bold"></span>
            <span id="pwdCount">0 character</span>

            
          </div>
          
          <div class="col-md-6">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirmInput" placeholder="Confirm Password" class="form-control">
            <span id="matchMsg" class="text-danger small"></span>
          </div>
        </div>


    <!-- Two columns side by side for Email + Phone Number -->

        <div class="row mb-3">
          <div class="col-md-6">
            <label for="email01" class="form-label">Enter Email</label>
            <input type="email" id="email01" name="email01" placeholder="Email address" class="form-control">
            <span id="emailErr" class="text-muted small"></span>
          </div>

          <div class="col-md-6">
            <label for="phone01" class="form-label">Enter Phone Number</label>
            <input type="tel" id="phone01" name="phone01" placeholder="10-digit Phone Number" class="form-control">
            <span id="phoneErr" class="text-muted small"></span>
          </div>
        </div>

        
        <div class="mb-3">
          <label for="quantity01" class="form-label">Enter Quantity</label>
          <input type="number" id="quantity01" name="quantity01" placeholder="Quantity (0-99)" class="form-control">
          <span id="quantityCount">0 digit</span>
          <p><span id="quantityErr" class="text-muted small" style="font-style: italic;">Quantity is a 2-digit number.</span></p>
        </div>

        <!-- Two columns side by side for Age + Guardian -->
        <div class="row mb-3">
          <div class="col-md-6">
            <label for="ageInput" class="form-label">Enter Your Age (years) implements conditional logic</label>
            <input type="number" id="ageInput" name="age" placeholder="Age (0-199)" class="form-control">
            <span id="ageErr" class="text-danger small"></span>
          </div>
          <div class="col-md-6" id="guardianSection" style="display:none" class= "form-label">
            <label>Guardian Name (required if under 18)</label>
            <input type="text" id="guardianInput" name="guardian" placeholder="Guardian name" class="form-control">
            <span id="guardianErr" class="text-danger small"></span>
          </div>
        </div>

        

  <!-- Relationship Status dropdown Two columns side by side for Relationship Status + Spouse Name -->                                                  
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Marital Status</label>
            <!-- form-select = Bootstrap styled dropdown -->
            <select id="relStatus" name="relstatus" class="form-select" aria-placeholder="Select Status">
            <option value="notdisclose">Not Disclosing</option>
            <option value="unmarried">Unmarried</option>
            <option value="married">Married</option>
            <option value="separated">Separated</option>
            </select>
            <span id="relErr" class="text-danger small"></span>
          </div>
          <div class="col-md-6" id="spouseSection" style="display:none" class="form-label">
            <label for="spouseInput">Spouse Name (required if married)</label>
            <input type="text" id="spouseInput" name="spousename" placeholder="Spouse name" class="form-control">
            <span id="spouseErr" class="text-danger small"></span>
          </div>
        </div>

    <!-- <br><br>
    <input type="submit" id="sbutt1" name="submeet01" value="Submit"> -->

        <button type="submit" class="btn btn-outline-success w-100 mt-2" id="sbutt1" name="submeet01" value="Submit">Save Entry</button>

        </form>

      <!-- Success message -->
      <p id="msg" class="text-success fw-bold mt-3"></p>

    </div>
  </div>
  
  <h5>Form entries from database:</h5>
  <p>Click on the button below to view them</p>
  <button type="button" class="btn btn-outline-warning w-100 mt-2" id="showTableBtn">Show Table of Entries</button>
  <div id="tableArea"></div>
  

</div>

</body>
</html>
