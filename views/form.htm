<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Forms</title>
  <link rel="stylesheet" href="/css/form.css">
</head>

<body>

 <!-- In form.htm — add this near the top of body -->
  <p id="welcomeMsg"></p>
  <a href="/logout">Logout</a>


<div class="form-container">
 
  <h3>Form Implementation</h3>
  <p>2nd Form — Action, Method, AutoComplete, noValidate</p>

  <form id="myForm" autocomplete="on" novalidate name="BadaForm">

    <label for="fnaam">Enter First Name</label><br>
    <input type="text" id="fnaam" name="fn01" placeholder="First name"><br>
    <span id="firstErr" class="err"></span>
    <span id="fnameCount" class="counter">0 characters</span>

    <br><label for="lnaam">Enter Last Name</label><br>
    <input type="text" id="lnaam" name="fn02" placeholder="Last name"><br>
    <span id="lastErr" class="err"></span>
    <span id="lnameCount" class="counter">0 characters</span>

    <br><label for="num01">Enter Some Numerical Value</label><br>
    <input type="text" id="num01" name="number1" placeholder="Some number"><br>
    <span id="numErr" class="err"></span>

    <br><label for="pwd01">Enter Password</label><br>
    <input type="password" id="pwd01" name="password01" placeholder="Password"><br>
    <span id="pwdErr" class="err"></span>
    <span id="pwdCount" class="counter">0 characters</span>
    <span id="strengthMsg"></span>

    <br><label for="confirmInput">Confirm Password</label><br>
    <input type="password" id="confirmInput" placeholder="Confirm password"><br>
    <span id="matchMsg"></span>

    <br><label for="email01">Enter Email</label><br>
    <input type="email" id="email01" name="email01" placeholder="Email address"><br>
    <span id="emailErr" class="err"></span>

    <br><label for="phone01">Enter Phone Number</label><br>
    <input type="tel" id="phone01" name="phone01" placeholder="10 digit phone number"><br>
    <span id="phoneErr" class="err"></span>

    <br><label for="quantity01">Enter Quantity</label><br>
    <input type="number" id="quantity01" name="quantity01" placeholder="Quantity"><br>
    <span id="quantityErr" class="err"></span>

    <br><label for="ageInput">Enter Your Age</label><br>
    <input type="number" id="ageInput" name="age" placeholder="Your age"><br>
    <span id="ageErr" class="err"></span>

    <div id="guardianSection" style="display:none">
      <br><label>Guardian Name (required if under 18)</label><br>
      <input type="text" id="guardianInput" name="guardian" placeholder="Guardian name"><br>
      <span id="guardianErr" class="err"></span>
    </div>

    <br><label for="relStatus">Relationship Status</label><br>
    <select id="relStatus" name="relstatus">
      <option value="">Select status</option>
      <option value="married">Married</option>
      <option value="separated">Separated</option>
      <option value="unmarried">Unmarried</option>
    </select>
    <span id="relErr" class="err"></span>

    <div id="spouseSection" style="display:none">
      <br><label for="spouseInput">Spouse Name (required if married)</label><br>
      <input type="text" id="spouseInput" name="spousename" placeholder="Spouse name"><br>
      <span id="spouseErr" class="err"></span>
    </div>

    <br><br>
    <input type="submit" id="sbutt1" name="submeet01" value="Submit">

  </form>

  <p id="msg" style="color:green; font-weight:bold;"></p>

  <br>
  <p>Form entries from database:</p>
  <div id="tableArea"></div>

</div>

<!-- Single script tag — all JS is in /js/form.js -->
<script src="/js/form.js"></script>

</body>
</html>
